name: Flywheel Maintenance

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Custom task for Claude'
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-maintenance
  cancel-in-progress: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set maintenance prompt
        id: prompt
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
          else
            cat >> $GITHUB_OUTPUT << 'PROMPT'
          task=You are the Flywheel housekeeping and self-healing agent. Perform these tasks in order:

          ## 1. Housekeeping
          - Update the "Last updated" date in index.html header to today's date (YYYY-MM-DD format)
          - Update CHANGELOG.md — add an entry summarizing recent git commits since the last changelog entry
          - Review project-map.md — check if line numbers and structure still match index.html, fix if needed
          - Review .claude/skillbank-index.md — remove any malformed entries (entries where the link text is a question or error message rather than a skill name)

          ## 2. Self-healing
          - Read lessons.md to find issues that have failed 2 or more times (look for repeated FAILURE entries with the same or similar title)
          - For each repeated failure pattern found, create a new GitHub issue with label "agent-task" that describes the failure pattern clearly and asks the agent to fix the root cause
          - Do not create duplicate healing issues — check open issues first to avoid creating the same healing issue twice

          ## Rules
          - Commit housekeeping changes directly to main with message "chore: daily housekeeping"
          - Do not open a PR for housekeeping changes
          - Do not modify any logic in index.html — only the date string
          - Do not implement features or fix bugs directly — create issues for the agent instead
          PROMPT
          fi

      - name: Run Claude Maintenance Agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 15 --model claude-haiku-4-5-20251001 --allowedTools Edit,Write,Bash,GitCreateBranch,GitCommit,GitPush,CreatePullRequest,ReadFile,ListFiles,Glob"
          prompt: ${{ steps.prompt.outputs.task }}

      - name: Extract and save maintenance cost
        if: always()
        env:
          TASK_LABEL: ${{ github.event.inputs.task || 'daily housekeeping' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          try:
              d = json.load(open('/home/runner/work/_temp/claude-execution-output.json'))
              cost = d.get('total_cost_usd', 0)
          except:
              cost = 0

          costs_file = Path('costs.json')
          existing = json.loads(costs_file.read_text()) if costs_file.exists() else []
          existing.insert(0, {
              'timestamp': datetime.now(timezone.utc).isoformat(),
              'issue_title': 'maintenance: ' + os.environ.get('TASK_LABEL', 'daily housekeeping'),
              'outcome': os.environ.get('JOB_STATUS', 'unknown'),
              'cost_usd': cost
          })
          costs_file.write_text(json.dumps(existing, indent=2))
          print(f'Cost recorded: {cost:.4f}')
          "

      - name: Commit cost data
        if: always()
        run: |
          git config user.name  "flywheel-distiller[bot]"
          git config user.email "flywheel-distiller@users.noreply.github.com"
          git stash 2>/dev/null || true
          git add costs.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No cost changes to commit."
          else
            git pull --rebase origin main
            git commit -m "chore: record maintenance cost"
            git push origin main
            echo "✅ Cost committed"
          fi
