name: Flywheel Maintenance

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Custom task for Claude'
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-maintenance
  cancel-in-progress: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 15 --model claude-haiku-4-5-20251001 --allowedTools Edit,Write,Bash,GitCreateBranch,GitCommit,GitPush,CreatePullRequest,ReadFile,ListFiles,Glob"
          prompt: |
            ${{ github.event.inputs.task || '
            You are the Flywheel housekeeping agent. Perform these lightweight maintenance tasks:

            1. Update the "Last updated" date in index.html header to today\'s date (YYYY-MM-DD format)
            2. Update CHANGELOG.md — add an entry summarizing recent git commits since the last changelog entry
            3. Review project-map.md — check if line numbers and structure still match index.html, fix if needed
            4. Review .claude/skillbank-index.md — remove any malformed entries (entries where the link text is a question or error message rather than a skill name)

            Rules:
            - Commit all changes directly to main in a single commit with message "chore: daily housekeeping"
            - Do not open a PR
            - Do not modify any logic in index.html — only the date string
            - Do not implement features or fix bugs
            ' }}
